<div class="collections-wrapper container">
  <!-- Section Title -->
  <header class="collections-header animate-fade-in">
    <span class="badge">Olfactory Chapters</span>
    <h1 class="page-title">Curated Collections</h1>
    <p class="page-subtitle">Each collection tells a distinct story, designed to capture specific moods, moments, and settings.</p>
  </header>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="firebaseService.loading()">
    <div class="spinner"></div>
    <p>Curating collections...</p>
  </div>

  <!-- Collections List -->
  <div class="collections-grid animate-fade-in animate-delay-1" *ngIf="!firebaseService.loading()">
    <div 
      class="collection-banner-card glass-panel" 
      *ngFor="let coll of firebaseService.collections()"
      (click)="viewCollection(coll)"
    >
      <div class="banner-image-wrapper">
        <img [src]="coll.imageUrl" [alt]="coll.name" class="banner-image"/>
        <div class="banner-overlay"></div>
      </div>
      
      <div class="banner-content">
        <h2 class="collection-title">{{ coll.name }}</h2>
        <p class="collection-desc">{{ coll.description }}</p>
        <button class="btn btn-secondary explore-btn">Explore Collection</button>
      </div>
    </div>
  </div>
</div>
